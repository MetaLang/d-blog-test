title: D Language Blog Archive
description: Testing the WordPress to Jekyll Migration

url: "https://metalang.github.io"
baseurl: "/d-blog-test"

permalink: /:slug/

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

paginate: 10
paginate_path: "/page/:num/"

feed:
  path: "/feed.xml"
